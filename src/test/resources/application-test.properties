# =========================================================================
# Test profile — overrides application.properties for the "test" Spring profile
# =========================================================================

# --- Disable Eureka (no service registry in tests) ---
eureka.client.enabled=false
eureka.client.fetch-registry=false
eureka.client.register-with-eureka=false
spring.cloud.gateway.discovery.locator.enabled=false

# --- Disable Redis health check (TokenBlacklistService is @MockBean in tests) ---
management.health.redis.enabled=false

# --- Disable Zipkin span export (keep tracing auto-config so Tracer bean is available) ---
management.tracing.sampling.probability=0.0

# --- Override user-service route to point at the WireMock server ---
# test.wiremock.uri is registered at runtime via @DynamicPropertySource
spring.cloud.gateway.routes[0].id=user-service-test
spring.cloud.gateway.routes[0].uri=${test.wiremock.uri:http://localhost:9999}
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**

# --- JWT (public-key-path set via @DynamicPropertySource at runtime) ---
jwt.issuer=https://auth.prodemaster.com
jwt.audience=https://api.prodemaster.com
jwt.clock-skew-seconds=30
jwt.algorithm-whitelist=RS256,RS384,RS512
jwt.logging-verbose=true
jwt.public-paths=/api/public/**,/actuator/health,/actuator/health/**,/users/auth/login,/users/auth/register,/users/auth/refresh

# --- Rate limiting: burst=10 keeps non-RL tests safe while allowing short RL tests ---
security.rate-limit.requests-per-minute=10
security.rate-limit.burst=10

# --- Security headers (defaults, same as production) ---
security.headers.hsts.max-age=31536000
security.headers.hsts.include-subdomains=true

# --- Actuator: expose prometheus and health for tests ---
management.endpoints.web.exposure.include=health,prometheus,metrics,info,loggers
management.endpoint.health.show-details=always
management.metrics.export.prometheus.enabled=true
