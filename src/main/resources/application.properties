spring.application.name=ApiGateway
server.port=8765

#Configuracion de Eureka
eureka.client.service-url.defaultZone=http://localhost:8761/eureka/
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

#Configuracion de Spring Cloud Gateway
spring.cloud.gateway.discovery.locator.enabled=true
spring.cloud.gateway.discovery.locator.lower-case-service-id=true

#Conectividad con zipkin para manejo de trazabilidad
spring.zipkin.base-url=http://localhost:9411
management.zipkin.tracing.endpoint=http://localhost:9411/api/v2/spans
management.tracing.sampling.probability=1.0

#Configuracion de logs
logging.pattern.level=%5p [${spring.application.name:},%X{traceId:-},%X{spanId:-}]
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - [${spring.application.name:},%X{traceId:-},%X{spanId:-}] %msg%n

# Item 2.8: Actuator - exponer health publicamente, rest protegido via JWT
# /actuator/health → publico (no JWT)
# /actuator/prometheus, /metrics, /env, /loggers → requieren JWT (NO estan en jwt.public-paths)
management.endpoints.web.exposure.include=health,prometheus,metrics,info,loggers
management.endpoint.health.show-details=when-authorized
management.endpoint.shutdown.enabled=false
management.metrics.export.prometheus.enabled=true

#Definicion de ruta
spring.cloud.gateway.routes[0].id=user-service
spring.cloud.gateway.routes[0].uri=lb://user-service
spring.cloud.gateway.routes[0].predicates[0]=Path=/users/**
spring.cloud.gateway.routes[0].filters[0]=RewritePath=/users/(?<segment>.*), /$\{segment}

spring.cloud.gateway.routes[1].id=match-service
spring.cloud.gateway.routes[1].uri=lb://match-service
spring.cloud.gateway.routes[1].predicates[0]=Path=/matches/api/v1/**

spring.cloud.gateway.routes[2].id=prediction-service
spring.cloud.gateway.routes[2].uri=lb://PREDICTION-SERVICE
spring.cloud.gateway.routes[2].predicates[0]=Path=/predictions/api/v1/**

spring.cloud.gateway.routes[3].id=scoring-service
spring.cloud.gateway.routes[3].uri=lb://SCORING-SERVICE
spring.cloud.gateway.routes[3].predicates[0]=Path=/scoring/**

# Item 2.1/2.3: JWT Configuration
jwt.public-key-path=classpath:certs/public.pem
#jwt.issuer=lb://user-service
jwt.issuer=https://auth.prodemaster.com
#jwt.audience=lb://api-gateway
jwt.audience=https://api.prodemaster.com
jwt.clock-skew-seconds=30
jwt.validation-timeout-ms=500
# Item 2.7: En produccion cambiar a false para no loguear detalles de errores JWT
jwt.logging-verbose=true
# Item 2.3: Solo algoritmos RSA permitidos (previene algorithm confusion attack)
jwt.algorithm-whitelist=RS256,RS384,RS512
# Item 2.5: Rutas publicas - NO requieren JWT
# auth flows + actuator health. Todo lo demas requiere token valido.
jwt.public-paths=/api/public/**,/actuator/health,/actuator/health/**,/users/auth/login,/users/auth/register,/users/auth/refresh

# Item 2.6: Security headers (SecurityHeadersFilter)
security.headers.hsts.max-age=31536000
security.headers.hsts.include-subdomains=true
security.headers.csp=default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'

# Item 2.10: Test endpoint - disabled by default. Set true only in dev profile.
app.endpoints.test.enabled=false
