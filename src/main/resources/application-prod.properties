# ============================================================
# Production profile overrides (activated with -Dspring.profiles.active=prod)
# ============================================================

# --- Tracing (Item 3.6) ---
# Lower sampling in prod to reduce cost while keeping statistical coverage.
tracing.sample.rate.admin=1.0
tracing.sample.rate.user=0.05
tracing.sample.rate.public=0.01

# Item 3.7: Externalised Zipkin endpoint (replace with your prod Zipkin host)
management.zipkin.tracing.endpoint=http://zipkin.prod.empresa.com:9411/api/v2/spans
management.tracing.sampling.probability=0.1

# --- Redis (Item 3.1) ---
spring.data.redis.host=redis.prod.empresa.com
spring.data.redis.port=6379
spring.data.redis.timeout=2000ms
# Set via environment variable: SPRING_DATA_REDIS_PASSWORD=<value>
spring.data.redis.password=${SPRING_DATA_REDIS_PASSWORD:}

# --- Rate limiting (Item 3.4) ---
# More restrictive in prod to protect downstream services.
security.rate-limit.requests-per-minute=60
security.rate-limit.burst=80

# --- JWT (security) ---
# Disable verbose JWT error details in logs to avoid leaking internals.
jwt.logging-verbose=false
